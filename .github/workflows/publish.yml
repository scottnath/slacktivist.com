name: Publish

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'astro.config.ts'
      - 'atproto.config.ts'
      - '.storybook/**'
      - 'package.json'
      - 'package-lock.json'
      - 'README.md'
  # Refresh static Bluesky engagement (likes, quotes, comments) at build time.
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  atproto-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@scottnath'

      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync blog to ATProto
        env:
          ATPROTO_APP_PASSWORD: ${{ secrets.ATPROTO_APP_PASSWORD }}
          ATP_IDENTIFIER: ${{ secrets.ATP_IDENTIFIER }}
          BLUESKY_CROSSPOST: ${{ vars.BLUESKY_CROSSPOST }}
        run: |
          if [ -z "$ATPROTO_APP_PASSWORD" ]; then
            echo "Skipping ATProto sync (ATPROTO_APP_PASSWORD not configured)"
            exit 0
          fi
          npm run sync:atproto

      - name: Commit sync state
        env:
          ATPROTO_APP_PASSWORD: ${{ secrets.ATPROTO_APP_PASSWORD }}
        run: |
          if [ -z "$ATPROTO_APP_PASSWORD" ]; then
            echo "Skipping ATProto state commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add atproto-state.json atproto-syndication.json public/.well-known/site.standard.publication src/content/blog 2>/dev/null || true
          git diff --staged --quiet || git commit -m "🔄 Sync ATProto state [skip ci]"
          git push

  build:
    needs: atproto-sync
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@scottnath'

      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: npm run build

      - run: npm run build-storybook

      - run: mkdir -p dist/storybook && cp -r storybook-static/. dist/storybook/

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist
          include-hidden-files: 'true'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
